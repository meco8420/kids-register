<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>QRレジ</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: "Arial Rounded MT Bold", "Helvetica", sans-serif;
  background: linear-gradient(180deg, #a0e9ff, #fff7a0);
  color: #333;
}

/* 上（カメラ） */
.top {
  position: fixed;
  top: 0;
  width: 100%;
  height: 320px; /* ←追加（ここ重要） */
  background: #ff8fab;
  padding: 10px;
  z-index: 10;
  border-bottom: 5px solid #ff4d6d;

  display: flex;
  justify-content: center;
}

#reader {
  width: 100%;
  max-width: 400px;
  height: 100%;
  margin: 0 auto;
  border-radius: 15px;
  overflow: hidden;
}

#reader video {
  width: 100%;
  height: 100%;
  object-fit: cover;        /* ← ★これも必須 */
}

/* リスト */
#list {
  margin-top: 340px;
  margin-bottom: 160px;
  overflow-y: auto;
  padding: 10px;
  background: linear-gradient(180deg, #a0e9ff, #fff7a0);
}

/* 商品カード */
.item {
  background: #ffffff;
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 12px;
  box-shadow: 0 4px 0 #ffd166;
}

/* 上段 */
.item-top {
  display: flex;
  justify-content: space-between;
  font-size: 28px;
  font-weight: bold;
}

/* 下段 */
.item-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

/* 数量ボタン */
.qty-btn {
  background: #4cc9f0;
  border: none;
  color: white;
  font-size: 36px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin: 0 5px;
}

/* 削除 */
.delete-btn {
  background: #ff6b6b;
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 26px;
}

/* 下（固定） */
.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #ffd166;
  padding: 10px;
  border-top: 5px solid #ffb703;
}

/* 合計 */
.total {
  font-size: 50px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 10px;
}

/* ボタン */
.action-btn {
  width: 48%;
  padding: 15px;
  font-size: 50px;
  border: none;
  border-radius: 15px;
}

.checkout {
  background: #06d6a0;
  color: white;
}

.reset {
  background: #ef476f;
  color: white;
}

.scan-btn {
  font-size: 18px;
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;

  color: white;
  background: linear-gradient(145deg, #06d6a0, #00b894);

  box-shadow:
    0 4px 0 #019875,
    0 0 10px rgba(0,255,150,0.6);

  transition: all 0.15s ease;
}

/* 押したとき */
.scan-btn:active {
  transform: translateY(3px);
  box-shadow:
    0 1px 0 #019875,
    0 0 5px rgba(0,255,150,0.8);
}

/* ちょい光るアニメ */
.scan-btn::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(0,255,150,0.6);
  opacity: 0;
  transition: opacity 0.3s;
}

.scan-btn:hover::after {
  opacity: 1;
}

</style>
</head>
<body>
<div class="top">
  <button class="scan-btn" onclick="startScan()">
    📷 スキャン開始
  </button>
  <div id="reader"></div>
</div>
<div id="list"></div>

<div class="bottom">
  <div class="total">合計: <span id="total">0</span>円</div>
  <button class="action-btn checkout" onclick="checkout()">お会計</button>
  <button class="action-btn reset" onclick="resetCart()">リセット</button>
</div>

<audio id="beep" src="https://www.soundjay.com/buttons/sounds/beep-07.mp3"></audio>
</body>
<script>
  
let total = 0;
let products = {};
let cart = [];
let scanner;
let lastScanTime = 0;
const SCAN_INTERVAL = 1500; // 1.5秒

const SHEET_URL = "https://opensheet.elk.sh/1dwXnIlp0ejMUqyNpdbQyQa2StgdP8Suh9WxxDQysoqQ/シート1";

// window.addEventListener("load", () => {
//   startScan();
// });

// 商品取得
fetch(SHEET_URL)
  .then(res => res.json())
  .then(data => {
    data.forEach(item => {
      products[item.id.trim()] = {
        name: item.name,
        price: Number(item.price),
      };
    });
    render();
  });

// 音
function playBeep() {
  //const audio = document.getElementById("beep");
  //audio.currentTime = 0;
  //audio.play();
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(1000, ctx.currentTime);

    gain.gain.setValueAtTime(0.1, ctx.currentTime);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.1);
  } catch (e) {
    console.log("音再生失敗", e);
  }

}

// iPhone対策
document.body.addEventListener("click", () => {
  const audio = document.getElementById("beep");
  audio.play().then(() => {
    audio.pause();
    audio.currentTime = 0;
  });
}, { once: true });

// QR開始
function startScan() {
  if (scanner) return;
  document.querySelector("button").style.display = "none";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment"
     },
    { fps: 20, 
      qrbox: function(w, h) {
             const size = Math.min(w, h) * 0.6;
             return {
               width: size,
               height: size
            };
} },
    (decodedText) => {
      onScan(decodedText);
    },
    (error) => {
      // 読み取り失敗は無視（ログだけ）
      // console.log(error);
    }
  ).catch(err => {
    console.error("カメラ起動失敗:", err);
    alert("カメラが使えません（HTTPS or 権限を確認）");
  });
}

// スキャン
function onScan(id) {

 const now = Date.now();
  // ⛔ インターバル制御
  if (now - lastScanTime < SCAN_INTERVAL) {
    return;
  }
  lastScanTime = now;

  id = id.trim();

   // 読み込みチェック
  if (Object.keys(products).length === 0) {
    console.log("まだ読み込み中");
    return;
  }

  if (!products[id]) {
    console.log("未登録:", id);
    playErrorBeep();
    //alert("ないよ！");
    return;
  }

  playBeep();

  const existing = cart.find(item => item.id === id);

  if (existing) {
    existing.qty++;
  } else {
    cart.push({
      id,
      name: products[id].name,
      price: products[id].price,
      qty: 1
    });
  }

  total += products[id].price;
  render();
}

// 表示
function render() {
  
  const list = document.getElementById("list");
  list.innerHTML = "";

  cart.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="item-top">
        ${item.name} ×${item.qty}　${item.price * item.qty}円
      </div>

      <div class="item-bottom">
        <div>
          <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
          ${item.qty}
          <button class="qty-btn" onclick="changeQty(${index}, 1)">＋</button>
        </div>

        <button class="delete-btn" onclick="deleteItem(${index})">削除</button>
      </div>
    `;

    list.appendChild(div);
  });

  list.scrollTop = list.scrollHeight;
  document.getElementById("total").textContent = total;
}

// 数量変更
function changeQty(index, diff) {
  const item = cart[index];

  item.qty += diff;
  total += item.price * diff;

  if (item.qty <= 0) {
    cart.splice(index, 1);
  }

  render();
}

// 削除
function deleteItem(index) {
  total -= cart[index].price * cart[index].qty;
  cart.splice(index, 1);
  render();
}

// 会計
function checkout() {
  alert("合計: " + total + "円");
}

// リセット
function resetCart() {
  if (!confirm("リセットする？")) return;

  cart = [];
  total = 0;
  render();
}

function handleProduct(product, id) {
  console.log("商品追加:", product);

  playBeep();

  const existing = cart.find(item => item.id === id);

  if (existing) {
    existing.qty++;
  } else {
    cart.push({
      id,
      name: product.name,
      price: product.price,
      qty: 1
    });
  }

  total += product.price;

  render(); // ← これ絶対必要
}

function playErrorBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sawtooth"; // 少し濁った音
    osc.frequency.setValueAtTime(200, ctx.currentTime); // 低い音

    gain.gain.setValueAtTime(0.15, ctx.currentTime);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.2); // 少し長め
  } catch (e) {
    console.log("エラー音失敗", e);
  }
}
</script>

</body>
</html>
