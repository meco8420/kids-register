<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>QRレジ</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;
}

/* 上 */
.top {
  position: fixed;
  top: 0;
  width: 100%;
  background: #000;
  padding: 10px;
  z-index: 10;
}

#reader {
  width: 100%;
}

/* リスト */
#list {
  margin-top: 220px;
  margin-bottom: 140px;
  height: calc(100vh - 360px);
  overflow-y: auto;
  padding: 10px;
}

/* 商品カード */
.item {
  background: #1c1c1c;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}

/* 上段 */
.item-top {
  display: flex;
  justify-content: space-between;
  font-size: 16px;
}

/* 下段 */
.item-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}

/* 数量ボタン */
.qty-btn {
  background: #333;
  border: none;
  color: #fff;
  font-size: 18px;
  width: 32px;
  height: 32px;
  border-radius: 6px;
}

/* 削除 */
.delete-btn {
  background: #ff4444;
  border: none;
  color: #fff;
  padding: 5px 10px;
  border-radius: 6px;
}

/* 下 */
.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000;
  padding: 10px;
}

/* 合計 */
.total {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

/* ボタン */
.action-btn {
  width: 48%;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
}

.checkout {
  background: #00c853;
  color: white;
}

.reset {
  background: #555;
  color: white;
}
</style>
</head>

<body>

<div class="top">
  <div id="reader"></div>
  <button onclick="startScan()">スキャン開始</button>
</div>

<div id="list"></div>

<div class="bottom">
  <div class="total">合計: <span id="total">0</span>円</div>
  <button class="action-btn checkout" onclick="checkout()">お会計</button>
  <button class="action-btn reset" onclick="resetCart()">リセット</button>
</div>

<audio id="beep" src="https://www.soundjay.com/buttons/sounds/beep-07.mp3"></audio>

<script>
let total = 0;
let products = {};
let cart = [];
let scanner;
let lastScanTime = 0;
const SCAN_INTERVAL = 1500; // 1.5秒

const SHEET_URL = "https://opensheet.elk.sh/1dwXnIlp0ejMUqyNpdbQyQa2StgdP8Suh9WxxDQysoqQ/シート1";

// 商品取得
fetch(SHEET_URL)
  .then(res => res.json())
  .then(data => {
    data.forEach(item => {
      products[item.id.trim()] = {
        name: item.name,
        price: Number(item.price),
      };
    });
  });

// 音
function playBeep() {
  //const audio = document.getElementById("beep");
  //audio.currentTime = 0;
  //audio.play();
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(1000, ctx.currentTime);

    gain.gain.setValueAtTime(0.1, ctx.currentTime);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.1);
  } catch (e) {
    console.log("音再生失敗", e);
  }

}

// iPhone対策
document.body.addEventListener("click", () => {
  const audio = document.getElementById("beep");
  audio.play().then(() => {
    audio.pause();
    audio.currentTime = 0;
  });
}, { once: true });

// QR開始
function startScan() {
  if (scanner) return;

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      onScan(decodedText);
    }
  );
}

// スキャン
function onScan(id) {

 const now = Date.now();
  // ⛔ インターバル制御
  if (now - lastScanTime < SCAN_INTERVAL) {
    return;
  }
  lastScanTime = now;

  id = id.trim();

   // 読み込みチェック
  if (Object.keys(products).length === 0) {
    console.log("まだ読み込み中");
    return;
  }

  if (!products[id]) {
    console.log("未登録:", id);
    //alert("ないよ！");
    return;
  }

  playBeep();

  const existing = cart.find(item => item.id === id);

  if (existing) {
    existing.qty++;
  } else {
    cart.push({
      id,
      name: products[id].name,
      price: products[id].price,
      qty: 1
    });
  }

  total += products[id].price;
  render();
}

// 表示
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  cart.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="item-top">
        <span>${item.name}</span>
        <span>${item.price * item.qty}円</span>
      </div>

      <div class="item-bottom">
        <div>
          <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
          ${item.qty}
          <button class="qty-btn" onclick="changeQty(${index}, 1)">＋</button>
        </div>

        <button class="delete-btn" onclick="deleteItem(${index})">削除</button>
      </div>
    `;

    list.appendChild(div);
  });

  list.scrollTop = list.scrollHeight;
  document.getElementById("total").textContent = total;
}

// 数量変更
function changeQty(index, diff) {
  const item = cart[index];

  item.qty += diff;
  total += item.price * diff;

  if (item.qty <= 0) {
    cart.splice(index, 1);
  }

  render();
}

// 削除
function deleteItem(index) {
  total -= cart[index].price * cart[index].qty;
  cart.splice(index, 1);
  render();
}

// 会計
function checkout() {
  alert("合計: " + total + "円");
}

// リセット
function resetCart() {
  if (!confirm("リセットする？")) return;

  cart = [];
  total = 0;
  render();
}
</script>

</body>
</html>
